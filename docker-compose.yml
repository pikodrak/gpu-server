services:
  gpu-server:
    build: .
    image: gpu-server:latest
    ports:
      - "${GPU_SERVER_PORT:-8000}:8000"
    volumes:
      - ./models:/models
      - ./outputs:/app/outputs
      - ./.env:/app/.env:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
